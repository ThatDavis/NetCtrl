name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write


jobs:
  # ── Build matrix ────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.friendly_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            friendly_name: linux-x86_64
            archive: tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            friendly_name: linux-aarch64
            archive: tar.gz
            cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            friendly_name: macos-x86_64
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            friendly_name: macos-aarch64
            archive: tar.gz

          - target: x86_64-pc-windows-gnu
            os: windows-latest
            friendly_name: windows-x86_64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # windows-latest already has MinGW; just point the GNU target at it
      - name: Configure GNU linker (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          echo '[target.x86_64-pc-windows-gnu]' >> $env:USERPROFILE/.cargo/config.toml
          echo 'linker = "x86_64-w64-mingw32-gcc"' >> $env:USERPROFILE/.cargo/config.toml

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────────────────────
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/netcontrol"
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="netcontrol-${TAG}-${{ matrix.friendly_name }}.tar.gz"
          strip "${BIN}" 2>/dev/null || true
          tar -czf "${ARCHIVE}" -C "$(dirname ${BIN})" "$(basename ${BIN})"
          echo "ASSET=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN     = "target\${{ matrix.target }}\release\netcontrol.exe"
          $TAG     = "$env:GITHUB_REF_NAME"
          $ARCHIVE = "netcontrol-${TAG}-${{ matrix.friendly_name }}.zip"
          Compress-Archive -Path $BIN -DestinationPath $ARCHIVE
          echo "ASSET=$ARCHIVE" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: netcontrol-${{ matrix.friendly_name }}
          path: ${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 1

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "${PREV}" ]; then
            NOTES=$(git log "${PREV}..${TAG}" --pretty=format:'- %s (%h)' --no-merges)
          else
            NOTES=$(git log --pretty=format:'- %s (%h)' --no-merges)
          fi
          {
            echo "## What's Changed"
            echo ""
            echo "${NOTES}"
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Linux x86-64   | \`netcontrol-${TAG}-linux-x86_64.tar.gz\` |"
            echo "| Linux arm64    | \`netcontrol-${TAG}-linux-aarch64.tar.gz\` |"
            echo "| macOS x86-64   | \`netcontrol-${TAG}-macos-x86_64.tar.gz\` |"
            echo "| macOS arm64    | \`netcontrol-${TAG}-macos-aarch64.tar.gz\` |"
            echo "| Windows x86-64 | \`netcontrol-${TAG}-windows-x86_64.zip\` |"
          } > release_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: NET CONTROL ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
